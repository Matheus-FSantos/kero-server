server:
  servlet:
    context-path: /kero-server/v1

spring:
  application:
    name: kr-server
  datasource:
    url: jdbc:h2:mem:test
    username: sa
    password:
    driverClassName: org.h2.Driver
  h2:
    console:
      enabled: true
  gemini:
    api-key: ${GEMINI_APIKEY}
    base-url: https://generativelanguage.googleapis.com/v1beta

logging:
  structured:
    format:
      console: ecs
